# Single user-facing sweep config for the NSCC larger-model run.
#
# Choose datasets by placing their config name under the matching lane.
# Dataset details live in configs/<dataset>.yaml.
batch_sizes: [2, 4, 8, 16, 32, 64, 128]
benchmark_types:
  prefill: [batched_prefill]
  chat: [sharegpt, azure_chat]
  reasoning: [mmlu_pro]
  agentic: [mini_swe_agent]
port: 30000

# Add or remove models here. The harness runs every selected model against
# every selected dataset at every selected batch size.
# Largest tensor-parallel size in this file is tp=4 for the NSCC PBS request.
models:
  - id: Qwen/Qwen1.5-MoE-A2.7B-Chat
    slug: qwen1_5_moe
    served_model_name: qwen1_5_moe
    dtype: bfloat16
    context_length: 32768
    tp: 1
    mem_fraction_static: 0.90
    chunked_prefill_size: 131072
    max_prefill_tokens: 131072
    hf_config:
      model_type: qwen_moe
      num_hidden_layers: 24
      hidden_size: 2048
      intermediate_size: 5632
      moe_intermediate_size: 1408
      shared_expert_intermediate_size: 5632
      num_attention_heads: 16
      num_key_value_heads: 16
      head_dim: 128
      num_experts: 60
      num_experts_per_tok: 4

  # Qwen3-30B-A3B disabled while calibrating sBench against MoE-CAP with Qwen1.5 only.

  # Qwen3-Next-80B-A3B-Instruct was used as a larger reference before, but it
  # usually needs tp=8. Keep it disabled for this NSCC profile because max tp=4.
